project:
  name: legacy_group_safe
  seed: 20260719
  output_dir: /root/GW-YOLO-v2-artifacts

data:
  sources:
    - name: legacy_train
      images: /root/GW-YOLO/train/images
      labels: /root/GW-YOLO/train/labels
    - name: legacy_validation
      images: /root/GW-YOLO/val/val_3.0/images
      labels: /root/GW-YOLO/val/val_3.0/labels
  names: [chirp, noise]
  split:
    train: 0.70
    val: 0.15
    test: 0.15
    trials: 3000
    link_mode: symlink

training:
  common:
    imgsz: 640
    batch: 16
    workers: 4
    patience: 30
    deterministic: true
    seed: 20260719
    optimizer: auto
    amp: true
    cls: 1.0
    mosaic: 0.0
    mixup: 0.0
    degrees: 0.0
    flipud: 0.0
    fliplr: 0.0
    hsv_h: 0.0
    hsv_s: 0.0
    hsv_v: 0.0
    translate: 0.05
    scale: 0.10
    erasing: 0.0
  candidates:
    - name: yolo26n_grouped
      model: /root/GW-YOLO/yolo26n-seg.pt
      epochs: 100
    - name: yolo26m_grouped
      model: /root/GW-YOLO/yolo26m-seg.pt
      epochs: 180

quality:
  metric: metrics/mAP50(M)
  minimum: 0.72
  stop_when_met: true

catalog:
  source: /root/GW-YOLO/imgs/gw_4.0
  release: GWTC-4.0
  api_url: https://gwosc.org/eventapi/json/GWTC-4.0/
  confidence: 0.25
