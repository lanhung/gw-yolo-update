schema_version: 1
required_ifos: [H1, L1]
minimum_contiguous_segment_seconds: 16

# These are physical background durations, not rendered-window counts. The
# target deliberately exceeds AMPLFI's current 10,000-second validation floor.
minimum_duration_seconds:
  train: 200000
  val: 50000

minimum_gps_blocks:
  train: 50
  val: 13
